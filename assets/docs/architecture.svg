<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 820" width="100%" height="100%">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#595959" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#385723" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2f5597" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#7030a0" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#c65911" />
    </marker>
  </defs>

  <!-- Background Grid pattern for subtle design depth -->
  <rect width="650" height="820" fill="#fafafa" />
  
  <!-- Outer Border -->
  <rect width="650" height="820" fill="none" stroke="#e0e0e0" stroke-width="2" />

  <!-- SharedPreferences Connection Line (drawn first to sit behind boxes) -->
  <path d="M 325,400 L 325,720" stroke="#bf9000" stroke-width="1.5" stroke-dasharray="6,4" fill="none" />
  <text x="335" y="705" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10.5" fill="#bf9000" font-weight="500">persist / restore session</text>

  <!-- Connectors -->
  <!-- Sim -> Dev -->
  <path d="M 325,65 L 325,97" stroke="#385723" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" />
  <text x="335" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#385723" font-weight="500">broadcast TX</text>

  <!-- Dev -> SDK -->
  <path d="M 325,155 L 325,187" stroke="#595959" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <text x="335" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#595959" font-weight="500">raw bytes</text>

  <!-- SDK -> Repo -->
  <path d="M 325,245 L 325,277" stroke="#595959" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <text x="335" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#595959" font-weight="500">Stream&lt;ConnectionState&gt;</text>

  <!-- Repo -> Cubit -->
  <path d="M 325,335 L 325,367" stroke="#385723" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" />
  <text x="335" y="355" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#385723" font-weight="500">Stream&lt;parsed data&gt;</text>

  <!-- Cubit -> ScannerPage -->
  <path d="M 280,425 C 240,440 200,450 170,465" stroke="#7030a0" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)" />

  <!-- Cubit -> DeviceDetailsPage -->
  <path d="M 370,425 C 410,440 450,450 480,465" stroke="#7030a0" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)" />

  <!-- DeviceDetailsPage -> ForegroundServiceManager (Background Runtime Link) -->
  <path d="M 490,520 L 490,545 L 160,545 L 160,587" stroke="#c65911" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" />
  <text x="325" y="538" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#c65911" font-weight="500" text-anchor="middle">Background runtime</text>

  <!-- ================= NODES ================= -->

  <!-- 1. BlueNode-Sim (Simulator) -->
  <rect x="195" y="15" width="260" height="50" rx="8" ry="8" fill="#e2f0d9" stroke="#385723" stroke-width="1.5" />
  <text x="325" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13.5" font-weight="bold" fill="#385723" text-anchor="middle">BlueNode-Sim</text>
  <text x="325" y="49" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10.5" fill="#385723" text-anchor="middle">Python device simulator</text>

  <!-- 2. Physical Android Device -->
  <rect x="195" y="105" width="260" height="50" rx="8" ry="8" fill="#f2eedf" stroke="#7f6000" stroke-width="1.5" />
  <text x="325" y="124" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13.5" font-weight="bold" fill="#7f6000" text-anchor="middle">Physical Android Device</text>
  <text x="325" y="139" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10.5" fill="#7f6000" text-anchor="middle">Android GATT Server</text>

  <!-- 3. flutter_reactive_ble -->
  <rect x="195" y="195" width="260" height="50" rx="8" ry="8" fill="#f2eedf" stroke="#7f6000" stroke-width="1.5" />
  <text x="325" y="214" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13.5" font-weight="bold" fill="#7f6000" text-anchor="middle">flutter_reactive_ble</text>
  <text x="325" y="229" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10.5" fill="#7f6000" text-anchor="middle">BLE Library wrapper</text>

  <!-- 4. BleRepository -->
  <rect x="195" y="285" width="260" height="50" rx="8" ry="8" fill="#e2f0d9" stroke="#385723" stroke-width="1.5" />
  <text x="325" y="304" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13.5" font-weight="bold" fill="#385723" text-anchor="middle">BleRepository</text>
  <text x="325" y="319" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10.5" fill="#385723" text-anchor="middle">Data parsing &amp; operations</text>

  <!-- 5. DeviceDetailsCubit -->
  <rect x="195" y="375" width="260" height="50" rx="8" ry="8" fill="#f2ebfc" stroke="#7030a0" stroke-width="1.5" />
  <text x="325" y="394" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13.5" font-weight="bold" fill="#7030a0" text-anchor="middle">DeviceDetailsCubit</text>
  <text x="325" y="409" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10.5" fill="#7030a0" text-anchor="middle">Bloc / vitals state management</text>

  <!-- 6. ScannerPage -->
  <rect x="50" y="470" width="220" height="50" rx="8" ry="8" fill="#deeaf6" stroke="#2f5597" stroke-width="1.5" />
  <text x="160" y="489" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13.5" font-weight="bold" fill="#2f5597" text-anchor="middle">ScannerPage</text>
  <text x="160" y="504" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10.5" fill="#2f5597" text-anchor="middle">scan / list devices</text>

  <!-- 7. DeviceDetailsPage -->
  <rect x="380" y="470" width="220" height="50" rx="8" ry="8" fill="#deeaf6" stroke="#2f5597" stroke-width="1.5" />
  <text x="490" y="489" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13.5" font-weight="bold" fill="#2f5597" text-anchor="middle">DeviceDetailsPage</text>
  <text x="490" y="504" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10.5" fill="#2f5597" text-anchor="middle">Charts &amp; characteristic list</text>

  <!-- 8. Background Runtime subgraph container -->
  <rect x="20" y="555" width="610" height="120" rx="10" ry="10" fill="none" stroke="#c65911" stroke-dasharray="5,4" stroke-width="1.5" />
  <text x="35" y="575" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11.5" font-weight="bold" fill="#c65911">Background Runtime</text>

  <!-- Background Node A: ForegroundServiceManager -->
  <rect x="40" y="595" width="240" height="50" rx="8" ry="8" fill="#fce4d6" stroke="#c65911" stroke-width="1.5" />
  <text x="160" y="614" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#c65911" text-anchor="middle">ForegroundServiceManager</text>
  <text x="160" y="629" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#c65911" text-anchor="middle">flutter_foreground_task</text>

  <!-- FSM <-> System Notification arrow -->
  <path d="M 288,620 L 362,620" stroke="#c65911" stroke-width="1.5" fill="none" marker-start="url(#arrow-red)" marker-end="url(#arrow-red)" />
  <text x="325" y="613" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#c65911" font-weight="500" text-anchor="middle">update / callback</text>

  <!-- Background Node B: System Notification -->
  <rect x="370" y="595" width="240" height="50" rx="8" ry="8" fill="#fce4d6" stroke="#c65911" stroke-width="1.5" />
  <text x="490" y="614" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#c65911" text-anchor="middle">System Notification</text>
  <text x="490" y="629" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#c65911" text-anchor="middle">Vitals data / Disconnect action</text>

  <!-- 9. SharedPreferences -->
  <rect x="195" y="720" width="260" height="50" rx="8" ry="8" fill="#fff2cc" stroke="#bf9000" stroke-width="1.5" />
  <text x="325" y="739" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13.5" font-weight="bold" fill="#bf9000" text-anchor="middle">SharedPreferences</text>
  <text x="325" y="754" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10.5" fill="#bf9000" text-anchor="middle">Cached device ID &amp; subscriptions</text>

</svg>
